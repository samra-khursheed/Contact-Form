<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Samra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-left">
                <img src="./contact-vector.svg.svg" alt="Contact Us"  class="contact-vector">
                <div class="connect-info">
                    <h2>Contact Us</h2>
                    <p>Let's connect and discuss potential opportunities.</p>
                </div>
            </div>

            <div class="contact-right">
                <form action="https://formspree.io/f/xreoprne" method="POST" class="contact-form">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit" class="btn-submit">Submit Message</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
